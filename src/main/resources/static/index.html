<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockSphere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>StockSphere</h1>
    <p class="subtitle">Inventory Management System</p>

    <form id="productForm">

        <input
            type="text"
            id="productName"
            placeholder="Product Name"
            required>

        <input
            type="text"
            id="description"
            placeholder="Description"
            required>

        <input
            type="number"
            id="quantity"
            placeholder="Quantity"
            required>

        <button type="submit">
            Add Product
        </button>

    </form>

    <hr>

    <h2>Products</h2>

    <div id="productList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
